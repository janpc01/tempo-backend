spring:
  application:
    name: tempo
  config:
    import: 
      - aws-secretsmanager:/secrets/POSTGRESQL_HOST
      - aws-secretsmanager:/secrets/POSTGRESQL_USERNAME
      - aws-secretsmanager:/secrets/POSTGRESQL_PASSWORD
      - aws-secretsmanager:/secrets/POSTGRESQL_DB
  cloud:
    aws:
      secrets-manager:
        enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_USERNAME}:${POSTGRESQL_PASSWORD}@${POSTGRESQL_HOST}/${POSTGRESQL_DB}?sslmode=require
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
logging:
  level:
    org.springframework: DEBUG
    org.hibernate: ERROR
    org.flywaydb: ERROR
    org.postgresql: DEBUG
    org.testcontainers: ERROR
    io.awspring.cloud: DEBUG
